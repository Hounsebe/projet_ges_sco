<div class="cours-list-container p-6 flex flex-col gap-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Catalogue des Cours</h1>
      <p class="text-sm text-slate-500">Consultez et gérez la liste des cours dispensés.</p>
    </div>
    <button mat-flat-button routerLink="/cours/nouveau" class="add-btn flex items-center gap-2">
      <mat-icon>add</mat-icon>
      Ajouter un cours
    </button>
  </div>

  <!-- Reactive Content -->
  <ng-container *ngIf="cours$ | async as cours; else loading">

    <!-- Empty State -->
    <div *ngIf="cours.length === 0"
      class="flex flex-col items-center justify-center p-12 bg-white border border-dashed border-slate-200 rounded-2xl text-center">
      <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 mb-4">
        <mat-icon class="text-3xl">school</mat-icon>
      </div>
      <h3 class="text-lg font-bold text-slate-700 mb-1">Aucun cours trouvé</h3>
      <p class="text-sm text-slate-400 max-w-sm mb-6">Commencez par ajouter le tout premier cours au catalogue de l'établissement.</p>
      <button mat-stroked-button color="primary" routerLink="/cours/nouveau">
        Créer un cours
      </button>
    </div>

    <!-- Table State -->
    <div *ngIf="cours.length > 0"
      class="bg-white border border-slate-100 rounded-xl overflow-hidden shadow-md">
      <table mat-table [dataSource]="cours" class="w-full">

        <!-- Code Column -->
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef class="!px-6 !py-4 !bg-slate-50 !font-semibold !text-slate-600 !text-xs !uppercase !tracking-wider border-b border-slate-100">Code</th>
          <td mat-cell *matCellDef="let c" class="!px-6 !py-4 border-b border-slate-50">
            <span class="font-mono font-semibold text-indigo-700 text-sm bg-indigo-50 px-2 py-1 rounded">{{c.code}}</span>
          </td>
        </ng-container>

        <!-- Intitulé Column -->
        <ng-container matColumnDef="intitule">
          <th mat-header-cell *matHeaderCellDef class="!px-6 !py-4 !bg-slate-50 !font-semibold !text-slate-600 !text-xs !uppercase !tracking-wider border-b border-slate-100">Intitulé</th>
          <td mat-cell *matCellDef="let c" class="!px-6 !py-4 text-slate-800 font-medium border-b border-slate-50">{{c.intitule}}</td>
        </ng-container>

        <!-- Coefficient Column -->
        <ng-container matColumnDef="coefficient">
          <th mat-header-cell *matHeaderCellDef class="!px-6 !py-4 !bg-slate-50 !font-semibold !text-slate-600 !text-xs !uppercase !tracking-wider border-b border-slate-100">Coefficient</th>
          <td mat-cell *matCellDef="let c" class="!px-6 !py-4 border-b border-slate-50">
            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold bg-purple-50 text-purple-700">
              {{c.coefficient}}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-slate-50/70 transition-colors cursor-default"></tr>
      </table>
    </div>
  </ng-container>

  <!-- Loading Template -->
  <ng-template #loading>
    <div class="flex flex-col items-center justify-center py-20 gap-4">
      <mat-spinner diameter="40" color="primary"></mat-spinner>
      <p class="text-sm text-slate-400 animate-pulse">Chargement des cours...</p>
    </div>
  </ng-template>
</div>
