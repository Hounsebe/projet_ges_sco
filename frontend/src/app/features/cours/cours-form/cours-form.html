<div class="cours-form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>Créer un Nouveau Cours</h2>
      <p>Renseignez les détails du cours ci-dessous pour l'ajouter au catalogue.</p>
    </div>

    <form [formGroup]="coursForm" (ngSubmit)="onSubmit()" class="cours-form">
      <!-- Champ Code -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Code du cours</mat-label>
        <input matInput formControlName="code" placeholder="Ex: MAT101" />
        <mat-error *ngIf="coursForm.get('code')?.hasError('required')">
          Le code du cours est obligatoire.
        </mat-error>
      </mat-form-field>

      <!-- Champ Intitulé -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Intitulé du cours</mat-label>
        <input matInput formControlName="intitule" placeholder="Ex: Algèbre Linéaire" />
        <mat-error *ngIf="coursForm.get('intitule')?.hasError('required')">
          L'intitulé du cours est obligatoire.
        </mat-error>
      </mat-form-field>

      <!-- Champ Coefficient -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Coefficient</mat-label>
        <input matInput type="number" formControlName="coefficient" min="1" placeholder="Ex: 3" />
        <mat-error *ngIf="coursForm.get('coefficient')?.hasError('required')">
          Le coefficient est obligatoire.
        </mat-error>
        <mat-error *ngIf="coursForm.get('coefficient')?.hasError('min')">
          Le coefficient doit être supérieur ou égal à 1.
        </mat-error>
      </mat-form-field>

      <!-- Bouton d'action -->
      <div class="form-actions">
        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="coursForm.invalid || isLoading"
        >
          {{ isLoading ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </form>
  </div>
</div>
