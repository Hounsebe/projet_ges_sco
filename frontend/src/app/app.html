<div class="flex flex-col h-screen w-screen overflow-hidden bg-slate-50">
  <!-- Navbar -->
  <mat-toolbar class="flex items-center justify-between px-4 lg:px-6 bg-indigo-900 z-30 h-16 shrink-0 shadow-md">
    <div class="flex items-center gap-3">
      <button mat-icon-button (click)="toggleSidenav()" class="text-indigo-200 hover:text-white transition-colors">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center">
          <mat-icon class="text-white text-lg">school</mat-icon>
        </div>
        <span class="text-lg font-bold tracking-tight text-white">
          {{ title() }}
        </span>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button mat-icon-button class="text-indigo-200 hover:text-white transition-colors">
        <mat-icon>notifications_none</mat-icon>
      </button>
      <div class="flex items-center gap-2 border-l border-indigo-700 pl-3">
        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-semibold text-sm">
          A
        </div>
        <span class="text-sm font-medium text-indigo-100 hidden sm:inline">Administrateur</span>
      </div>
    </div>
  </mat-toolbar>

  <!-- Main Container -->
  <mat-sidenav-container class="flex-1 w-full bg-slate-50">
    <!-- Sidebar -->
    <mat-sidenav
      #sidenav
      mode="side"
      [opened]="isSidenavOpen()"
      class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0"
    >
      <div class="px-3 py-4 flex-1">
        <app-sidebar class="w-full flex-1"></app-sidebar>
      </div>

      <div class="p-4 border-t border-slate-100">
        <div class="text-xs text-slate-400 font-medium text-center">Version 1.0.0</div>
      </div>
    </mat-sidenav>

    <!-- Main Content Area -->
    <mat-sidenav-content class="bg-slate-50 overflow-y-auto">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
