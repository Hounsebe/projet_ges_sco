# ===================================================================
# CONFIGURATION DE LA BASE DE DONNÉES (XAMPP MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_scolaire_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURATION JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Utilisation d'un dialecte mis à jour et optimisé pour MySQL 8+ / MariaDB de XAMPP
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================================================
# CONFIGURATION DE SWAGGER UI (SPRINGDOC OPENAPI)
# ===================================================================
# Chemin d'accès pour obtenir les spécifications JSON de l'API
springdoc.api-docs.path=/api-docs
# Chemin d'accès pour ouvrir l'interface graphique interactive dans le navigateur
springdoc.swagger-ui.path=/swagger-ui.html

# ===================================================================
# CONFIGURATION ET FORMATAGE GLOBAL
# ===================================================================
# Formatage strict des dates pour correspondre aux requêtes JSON
spring.mvc.format.date=yyyy-MM-dd